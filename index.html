<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style6.css">
</head>
<body>
    
    <div class="wrapper">

        <h1>Weather App</h1>

        <div class="tab-container">
            <div class="tab" data-userWeather>Your Weather</div>
            <div class="tab" data-searchWeather>Search Weather</div>
        </div>
        <div class="weather-container">
            <!-- grant location access -->
        <div class="sub-container grant-location-container">
            <img src="535137.png" alt="location" width="80" height="80" loading="lazy">
            <p>Grant Loaction Access</p>
            <p>Allow Access to get Weather Information</p>
            <button class="btn" data-grantAccess>Grant Access</button>
        </div>

        <!-- search form->form container -->
        <form class="form-container" data-searchForm>
            <input placeholder="Search for City..." data-searchInput>
            <button class="btn" type="submit">
                <img src="search-icon.webp" alt="search" width="20" height="20" loading="lazy">
            </button>
        </form>

        <!-- loading screen conatiner -->
         <div class="sub-container loading-container">
            <img src="loading.gif" alt="load" width="150" height="150">
            <p>Loading</p>
         </div>

         <!-- show weather info -->
          <div class="sub-container user-info-container">
            <div class="name">
                <p data-cityName></p>
                <img data-countryIcon>
            </div>

            <p data-weatherDesc></p>

            <img data-weatherIcon>

            <p data-temp></p>

            <!-- 3 cards parameter -->
              <div class="parameter-container">
                <!-- card1 -->
              <div class="parameter">
                <img src="windspeed.jpg" width="150" height="150"  alt="windspeed">
                <p>windspeed</p>
                <p data-windspeed></p>
              </div>

              <!-- card2 -->
              <div class="parameter">
                <img src="humidity.jpg" width="150" height="150" alt="humidity">
                <p>humidity</p>
                <p data-humidity></p>
              </div>

              <!-- card3 -->
              <div class="parameter">
                <img src="clouds.jpg" width="150" height="150" alt="clouds">
                <p>Clouds</p>
                <p data-cloudiness></p>
              </div>
              </div>

          </div>
        </div>
        

    </div>
    <script src="index6.js"></script>
</body>
</html>
